<!DOCTYPE html>
<html>
<head>
<title>Reportes</title>
<style>
body { font-family: Arial; padding: 20px; }
.card {
  border: 1px solid #ccc;
  padding: 15px;
  margin-bottom: 15px;
  border-radius: 10px;
  box-shadow: 2px 2px 5px rgba(0,0,0,0.1);
}
.btn {
  display: inline-block;
  margin-top: 10px;
  background: #0077b6;
  color: white;
  padding: 6px 12px;
  border-radius: 5px;
  text-decoration: none;
}
.btn:hover { background: #023e8a; }
</style>
</head>
<body>
<h1>Reportes de Accidentes</h1>
<div id="lista"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDmttXAGdJfkjgDj-YHo5HT2mWZ_6u8RNg",
  authDomain: "revista-motos-e2b8c.firebaseapp.com",
  projectId: "revista-motos-e2b8c",
  storageBucket: "revista-motos-e2b8c.appspot.com", // ← Corregido
  messagingSenderId: "204349065643",
  appId: "1:204349065643:web:a5c40738565f0faa4aaaee",
  measurementId: "G-HNRJ2BP202"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const lista = document.getElementById("lista");

// Función para evitar XSS básico
const escapeHTML = (str) => {
  if (str == null) return "No disponible";
  return String(str)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;");
};

async function cargarReportes() {
  try {
    const q = query(collection(db, "Reportes"), orderBy("Fecha_Accidente", "desc"));
    const querySnapshot = await getDocs(q);
    
    if (querySnapshot.empty) {
      lista.innerHTML = "<p>No hay reportes disponibles.</p>";
      return;
    }

    querySnapshot.forEach((doc) => {
      const data = doc.data();
      const div = document.createElement("div");
      div.className = "card";
      
      // Validar si Fecha_Registro es Timestamp
      const fechaRegistro = data.Fecha_Registro?.toDate 
        ? data.Fecha_Registro.toDate().toLocaleDateString() 
        : "No disponible";

      // Validar URL antes de meterla
      const linkSeguro = data.Link && data.Link.startsWith("http") 
        ? `<a href="${escapeHTML(data.Link)}" target="_blank" rel="noopener noreferrer" class="btn">Ver evidencia</a>` 
        : `<span>❌ Sin evidencia</span>`;

      div.innerHTML = `
        <strong>Edad:</strong> ${escapeHTML(data.Edad)} <br>
        <strong>Usa casco:</strong> ${escapeHTML(data.Usa_Casco)} <br>
        <strong>Exceso de velocidad:</strong> ${escapeHTML(data.Exceso_Velocidad)} <br>
        <strong>Tipo de incidente:</strong> ${escapeHTML(data.Tipo_Incidente)} <br>
        <strong>Lesiones:</strong> ${escapeHTML(data.Lesiones)} <br>
        <strong>Ubicación:</strong> ${escapeHTML(data.Ubicacion || data.Ubicación)} <br>
        <strong>Fecha del accidente:</strong> ${escapeHTML(data.Fecha_Accidente)} <br>
        <strong>Fecha de registro:</strong> ${fechaRegistro} <br>
        ${linkSeguro}
      `;
      lista.appendChild(div);
    });

  } catch (error) {
    console.error("Error al cargar reportes:", error);
    lista.innerHTML = "<p>Error al cargar los reportes. Revisa la consola.</p>";
  }
}

cargarReportes();
</script>
</body>
</html>
