<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>reportes</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      background: #f8f9fa;
    }

    h1 {
      text-align: center;
      color: #023e8a;
    }

    .card {
      border: 1px solid #ccc;
      padding: 15px;
      margin-bottom: 15px;
      border-radius: 10px;
      box-shadow: 2px 2px 5px rgba(0,0,0,0.1);
      background: white;
    }

    .btn {
      display: inline-block;
      margin-top: 10px;
      background: #0077b6;
      color: white;
      padding: 6px 12px;
      border-radius: 5px;
      text-decoration: none;
    }

    .btn:hover {
      background: #023e8a;
    }
  </style>
</head>

<body>

  <h1>Reportes de Accidentes</h1>
  <div id="lista"></div>

  <script type="module">

    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

    import {
      getFirestore,
      collection,
      getDocs
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDmttXAGdJfkjgDj-YHo5HT2mWZ_6u8RNg",
      authDomain: "revista-motos-e2b8c.firebaseapp.com",
      projectId: "revista-motos-e2b8c",
      storageBucket: "revista-motos-e2b8c.firebasestorage.app",
      messagingSenderId: "204349065643",
      appId: "1:204349065643:web:a5c40738565f0faa4aaaee",
      measurementId: "G-HNRJ2BP202"
    };

    // Inicializar Firebase
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const lista = document.getElementById("lista");

    async function cargarreportes() {
      try {
        // Leer colección sin orderBy para evitar errores de índice
        const querySnapshot = await getDocs(collection(db, "reportes"));

        if (querySnapshot.empty) {
          lista.innerHTML = "<p>No hay reportes registrados.</p>";
          return;
        }

        querySnapshot.forEach((doc) => {
          const data = doc.data();

          const div = document.createElement("div");
          div.className = "card";

          div.innerHTML = `
            <strong>Edad:</strong> ${data.Edad || "No disponible"} <br>

            <strong>Usa casco:</strong> ${data.Usa_Casco || "No disponible"} <br>

            <strong>Exceso de velocidad:</strong> ${data.Exceso_Velocidad || "No disponible"} <br>

            <strong>Tipo de incidente:</strong> ${data.Tipo_Incidente || "No disponible"} <br>

            <strong>Lesiones:</strong> ${data.Lesiones || "No disponible"} <br>

            <strong>Ubicación:</strong> ${data.Ubicacion || data["Ubicación"] || "No disponible"} <br>

            <strong>Fecha del accidente:</strong> ${data.Fecha_Accidente || "No disponible"} <br>

            <strong>Fecha de registro:</strong>
            ${
              data.Fecha_Registro
                ? data.Fecha_Registro.toDate().toLocaleDateString()
                : "No disponible"
            }
            <br><br>

            ${
              data.Link
                ? `<a href="${data.Link}" target="_blank" class="btn">Ver evidencia</a>`
                : `<span>❌ Sin evidencia</span>`
            }
          `;

          lista.appendChild(div);
        });

      } catch (error) {
        console.error("Error al leer Firestore:", error);
        lista.innerHTML = "<p>Error al cargar los reportes.</p>";
      }
    }

    cargarreportes();

  </script>

</body>
</html>
